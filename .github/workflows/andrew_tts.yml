name: Andrew TTS

on:
  workflow_dispatch:
    inputs:
      text_input:
        description: "Paste text here (or leave blank to use input.txt from repo)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  tts:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout engine repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install edge-tts requests -q
          sudo apt-get install -y -q ffmpeg

      - name: Prepare input text
        run: |
          if [ -n "${{ github.event.inputs.text_input }}" ]; then
            echo "${{ github.event.inputs.text_input }}" > input.txt
          elif [ -f "input.txt" ]; then
            echo "Using input.txt from repo."
          else
            echo "ERROR: No input.txt found."
            exit 1
          fi

      - name: Run TTS
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          python - <<'PYEOF'
          import asyncio
          import edge_tts
          import time
          import os
          import glob
          import subprocess
          import requests
          from datetime import datetime

          VOICE       = "en-US-AndrewMultilingualNeural"
          CHUNK_SIZE  = 5000
          CHUNK_DIR   = "chunks"
          BATCH_SIZE  = 5
          BATCH_PAUSE = 3

          PAT = os.environ["PAT"]
          REPO = "hanshu1202/andrew-tts-audio"

          os.makedirs(CHUNK_DIR, exist_ok=True)

          with open("input.txt", "r", encoding="utf-8") as f:
              text = f.read().strip()

          all_chunks = [
              text[i:i+CHUNK_SIZE]
              for i in range(0, len(text), CHUNK_SIZE)
          ]

          total = len(all_chunks)

          print(f"Total characters: {len(text):,}")
          print(f"Total chunks: {total}")

          existing = sorted(glob.glob(f"{CHUNK_DIR}/chunk_*.mp3"))

          if existing:
              last = existing[-1]
              os.remove(last)
              print(f"Deleted last chunk (safety): {os.path.basename(last)}")
              start_idx = len(existing) - 1
              print(f"Resuming from chunk {start_idx + 1}")
          else:
              start_idx = 0
              print("Fresh run!")

          async def git_push(done):
              proc = await asyncio.create_subprocess_exec(
                  "bash",
                  "-c",
                  f'''
                  git config user.name "github-actions[bot]" &&
                  git config user.email "github-actions[bot]@users.noreply.github.com" &&
                  git pull --rebase origin main &&
                  git add chunks/ &&
                  git diff --cached --quiet || git commit -m "Progress: {done} chunks done" &&
                  git push
                  ''',
                  stdout=asyncio.subprocess.PIPE,
                  stderr=asyncio.subprocess.PIPE
              )

              await proc.communicate()
              print(f"[progress saved — {done} chunks]")

          async def process_chunk(idx, chunk):
              path = f"{CHUNK_DIR}/chunk_{idx:05d}.mp3"

              if os.path.exists(path):
                  print(f"chunk {idx+1}/{total} already done")
                  return path

              for attempt in range(3):
                  try:
                      comm = edge_tts.Communicate(chunk, VOICE)
                      await comm.save(path)
                      print(f"✓ chunk {idx+1}/{total}")
                      return path
                  except Exception as e:
                      print(
                          f"chunk {idx+1} attempt {attempt+1} failed: {e}"
                      )
                      await asyncio.sleep(5)

              return None

          async def main():
              batch_start = time.time()
              chunk_times = []
              done_count = 0

              for b in range(start_idx, total, BATCH_SIZE):

                  batch = [
                      (i, all_chunks[i])
                      for i in range(
                          b,
                          min(b + BATCH_SIZE, total)
                      )
                  ]

                  if chunk_times:
                      avg = sum(chunk_times) / len(chunk_times)
                      eta = int(avg * (total - b))
                      print(
                          f"Chunk {b+1}/{total} "
                          f"ETA {eta//60}m {eta%60}s"
                      )

                  t = time.time()

                  results = await asyncio.gather(
                      *[
                          process_chunk(idx, chunk)
                          for idx, chunk in batch
                      ]
                  )

                  chunk_times.append(
                      (time.time() - t) / len(batch)
                  )

                  done_count += sum(
                      1 for r in results if r
                  )

                  await git_push(done_count)

                  if b + BATCH_SIZE < total:
                      await asyncio.sleep(BATCH_PAUSE)

              done_files = sorted(
                  glob.glob(f"{CHUNK_DIR}/chunk_*.mp3")
              )

              timestamp = datetime.now().strftime(
                  "%Y%m%d_%H%M%S"
              )

              output_file = f"/tmp/andrew_{timestamp}.mp3"

              filelist = f"{CHUNK_DIR}/filelist.txt"

              with open(filelist, "w") as f:
                  for p in done_files:
                      f.write(
                          f"file '{os.path.abspath(p)}'\n"
                      )

              subprocess.run(
                  [
                      "ffmpeg",
                      "-y",
                      "-f",
                      "concat",
                      "-safe",
                      "0",
                      "-i",
                      filelist,
                      "-c",
                      "copy",
                      output_file
                  ],
                  check=True
              )

              size_mb = (
                  os.path.getsize(output_file)
                  / 1024
                  / 1024
              )

              print(
                  f"Merge complete. Size: {size_mb:.1f} MB"
              )

              headers = {
                  "Authorization": f"token {PAT}",
                  "Accept":
                  "application/vnd.github.v3+json"
              }

              tag = (
                  f"tts-"
                  f"{datetime.now().strftime('%Y%m%d-%H%M%S')}"
              )

              release = requests.post(
                  f"https://api.github.com/repos/{REPO}/releases",
                  headers=headers,
                  json={
                      "tag_name": tag,
                      "name": tag,
                      "draft": False,
                      "prerelease": False
                  }
              )

              release.raise_for_status()

              upload_url = (
                  release.json()["upload_url"]
                  .replace("{?name,label}", "")
              )

              with open(output_file, "rb") as f:
                  upload = requests.post(
                      f"{upload_url}?name={os.path.basename(output_file)}",
                      headers={
                          "Authorization":
                          f"token {PAT}",
                          "Content-Type":
                          "audio/mpeg"
                      },
                      data=f
                  )

              upload.raise_for_status()

              print(
                  upload.json()["browser_download_url"]
              )

          asyncio.run(main())
          PYEOF
