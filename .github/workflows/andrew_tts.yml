name: Andrew TTS

on:
  workflow_dispatch:
    inputs:
      text_input:
        description: "Paste text here (or leave blank to use input.txt from repo)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  tts:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout engine repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install edge-tts requests -q
          sudo apt-get install -y -q ffmpeg

      - name: Prepare input text
        run: |
          if [ -n "${{ github.event.inputs.text_input }}" ]; then
            echo "${{ github.event.inputs.text_input }}" > input.txt
          elif [ -f "input.txt" ]; then
            echo "Using input.txt from repo."
          else
            echo "ERROR: No input.txt found."
            exit 1
          fi

      - name: Run TTS
        run: |
          python - <<'PYEOF'
          import asyncio, edge_tts, time, os, glob, subprocess, requests
          from datetime import datetime

          VOICE       = "en-US-AndrewMultilingualNeural"
          CHUNK_SIZE  = 5000
          CHUNK_DIR   = "chunks"   # saved in engine repo
          BATCH_SIZE  = 5
          BATCH_PAUSE = 3
          PAT         = os.environ["PAT"]
          REPO        = "hanshu1202/andrew-tts-audio"
          os.makedirs(CHUNK_DIR, exist_ok=True)

          with open("input.txt", "r", encoding="utf-8") as f:
              text = f.read().strip()

          all_chunks = [text[i:i+CHUNK_SIZE] for i in range(0, len(text), CHUNK_SIZE)]
          total      = len(all_chunks)
          print(f"Total characters: {len(text):,}")
          print(f"Total chunks: {total}")

          # Delete last chunk (corruption protection)
          existing = sorted(glob.glob(f"{CHUNK_DIR}/chunk_*.mp3"))
          if existing:
              last = existing[-1]
              os.remove(last)
              print(f"Deleted last chunk (safety): {os.path.basename(last)}")
              start_idx = len(existing) - 1
              print(f"Resuming from chunk {start_idx+1}...")
          else:
              start_idx = 0
              print("Fresh run!")

          async def git_push(done):
              proc = await asyncio.create_subprocess_exec(
                  "bash", "-c",
                  f'git config user.name "github-actions[bot]" && '
                  f'git config user.email "github-actions[bot]@users.noreply.github.com" && '
                  f'git pull --rebase origin main && '
                  f'git add chunks/ && '
                  f'git diff --cached --quiet || git commit -m "Progress: {done} chunks done" && '
                  f'git push',
                  stdout=asyncio.subprocess.PIPE,
                  stderr=asyncio.subprocess.PIPE
              )
              await proc.communicate()
              print(f"  [progress saved — {done} chunks]")

          async def process_chunk(idx, chunk):
              path = f"{CHUNK_DIR}/chunk_{str(idx).zfill(5)}.mp3"
              if os.path.exists(path):
                  print(f"  chunk {idx+1}/{total} already done, skipping...")
                  return path
              for attempt in range(3):
                  try:
                      comm = edge_tts.Communicate(chunk, VOICE)
                      await comm.save(path)
                      print(f"  ✓ chunk {idx+1}/{total} done")
                      return path
                  except Exception as e:
                      print(f"  chunk {idx+1} attempt {attempt+1} failed: {e}")
                      await asyncio.sleep(5)
              print(f"  chunk {idx+1} failed 3 times, skipping.")
              return None

          async def main():
              batch_start = time.time()
              chunk_times = []
              done_count  = 0

              for b in range(start_idx, total, BATCH_SIZE):
                  batch   = [(i, all_chunks[i]) for i in range(b, min(b+BATCH_SIZE, total))]
                  elapsed = int(time.time() - batch_start)

                  if chunk_times:
                      avg = sum(chunk_times) / len(chunk_times)
                      eta = int(avg * (total - b))
                      print(f"Batch {b//BATCH_SIZE+1}  Chunk {b+1}/{total}  ETA: {eta//60}m {eta%60}s  Elapsed: {elapsed//60}m {elapsed%60}s")
                  else:
                      print(f"Batch {b//BATCH_SIZE+1}  Chunk {b+1}/{total}  ETA: calculating...")

                  t       = time.time()
                  results = await asyncio.gather(*[process_chunk(idx, chunk) for idx, chunk in batch])
                  chunk_times.append((time.time() - t) / len(batch))
                  done_count += sum(1 for r in results if r)

                  # Save progress to engine repo every batch
                  await git_push(done_count)

                  if b + BATCH_SIZE < total:
                      await asyncio.sleep(BATCH_PAUSE)

              # Merge locally
              done_files  = sorted(glob.glob(f"{CHUNK_DIR}/chunk_*.mp3"))
              print(f"\nMerging {len(done_files)} chunks locally...")
              timestamp   = datetime.now().strftime("%Y%m%d_%H%M%S")
              OUTPUT      = f"/tmp/andrew_{timestamp}.mp3"
              list_path   = f"{CHUNK_DIR}/filelist.txt"
              merge_start = time.time()

              with open(list_path, "w") as f:
                  for p in done_files:
                      f.write(f"file '{os.path.abspath(p)}'\n")

              process = subprocess.Popen(
                  ["ffmpeg", "-y", "-f", "concat", "-safe", "0", "-i", list_path, "-c", "copy", OUTPUT],
                  stderr=subprocess.PIPE, text=True
              )
              process.wait()

              if process.returncode != 0:
                  print("Merge failed!")
                  exit(1)

              size_mb = os.path.getsize(OUTPUT) / 1024 / 1024
              elapsed = int(time.time() - merge_start)
              print(f"Merge DONE! Time: {elapsed//60}m {elapsed%60}s")
              print(f"File size: {size_mb:.1f} MB")

              # Upload to GitHub Releases
              headers = {
                  "Authorization": f"token {PAT}",
                  "Accept":        "application/vnd.github.v3+json"
              }
              tag       = f"tts-{datetime.now().strftime('%Y%m%d-%H%M%S')}"
              timestamp = datetime.now().strftime("%Y-%m-%d %H:%M")

              print("\nCreating GitHub Release...")
              resp = requests.post(
                  f"https://api.github.com/repos/{REPO}/releases",
                  headers=headers,
                  json={
                      "tag_name":   tag,
                      "name":       f"TTS Output — {timestamp}",
                      "body":       f"Auto-generated TTS audio.\nFile: {os.path.basename(OUTPUT)}",
                      "draft":      False,
                      "prerelease": False
                  }
              )

              if resp.status_code != 201:
                  print(f"Failed to create release: {resp.status_code} {resp.text}")
                  exit(1)

              upload_url = resp.json()["upload_url"].replace("{?name,label}", "")
              print(f"Uploading {size_mb:.1f} MB to Releases...")

              with open(OUTPUT, "rb") as f:
                  upload_resp = requests.post(
                      f"{upload_url}?name={os.path.basename(OUTPUT)}",
                      headers={
                          "Authorization": f"token {PAT}",
                          "Content-Type":  "audio/mpeg"
                      },
                      data=f,
                      timeout=600
                  )

              if upload_resp.status_code == 201:
                  print(f"\nDONE! Download: {upload_resp.json()['browser_download_url']}")
              else:
                  print(f"Upload failed: {upload_resp.status_code} {upload_resp.text}")
                  exit(1)

              # Cleanup chunks from engine repo after successful upload
              proc = await asyncio.create_subprocess_exec(
                  "bash", "-c",
                  'git config user.name "github-actions[bot]" && '
                  'git config user.email "github-actions[bot]@users.noreply.github.com" && '
                  'git pull --rebase origin main && '
                  'rm -rf chunks/ && '
                  'git add -A && '
                  'git diff --cached --quiet || git commit -m "Cleanup: chunks deleted after merge" && '
                  'git push',
                  stdout=asyncio.subprocess.PIPE,
                  stderr=asyncio.subprocess.PIPE
              )
              await proc.communicate()
              print("Chunks cleaned from engine repo!")

          asyncio.run(main())
          PYEOF
        env:
          PAT: ${{ secrets.PAT }}
