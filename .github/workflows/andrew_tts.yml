name: Andrew TTS

on:
  workflow_dispatch:
    inputs:
      text_input:
        description: "Paste text here (or leave blank to use input.txt from repo)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  tts:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout engine repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Checkout audio repo
        uses: actions/checkout@v4
        with:
          repository: hanshu1202/andrew-tts-audio
          token: ${{ secrets.PAT }}
          path: audio_repo

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install edge-tts -q
          sudo apt-get install -y -q ffmpeg

      - name: Prepare input text
        run: |
          if [ -n "${{ github.event.inputs.text_input }}" ]; then
            echo "${{ github.event.inputs.text_input }}" > input.txt
          elif [ -f "input.txt" ]; then
            echo "Using input.txt from repo."
          else
            echo "ERROR: No input.txt found and no text provided."
            exit 1
          fi

      - name: Run TTS
        run: |
          python - <<'EOF'
          import asyncio, edge_tts, time, os, subprocess, glob
          from datetime import datetime

          VOICE      = "en-US-AndrewMultilingualNeural"
          CHUNK_SIZE = 5000
          CHUNK_DIR  = "chunks"
          SAVE_EVERY = 5        # commit progress to repo every 5 chunks
          os.makedirs(CHUNK_DIR, exist_ok=True)

          with open("input.txt", "r", encoding="utf-8") as f:
              text = f.read().strip()

          print(f"Total characters: {len(text):,}")

          # ── Delete last chunk (may be corrupted from previous killed run) ──
          existing = sorted(glob.glob(f"{CHUNK_DIR}/chunk_*.mp3"))
          if existing:
              last = existing[-1]
              os.remove(last)
              print(f"Deleted last chunk (safety): {os.path.basename(last)}")
              print(f"Resuming from chunk {len(existing)-1}...")
          else:
              print("Fresh run, no existing chunks.")

          async def git_commit_progress(done_count):
              proc = await asyncio.create_subprocess_exec(
                  "bash", "-c",
                  f'git config user.name "github-actions[bot]" && '
                  f'git config user.email "github-actions[bot]@users.noreply.github.com" && '
                  f'git add chunks/ && '
                  f'git diff --cached --quiet || git commit -m "Progress: {done_count} chunks done" && '
                  f'git push',
                  stdout=asyncio.subprocess.PIPE,
                  stderr=asyncio.subprocess.PIPE
              )
              await proc.communicate()
              print(f"  [saved progress to repo]")

          async def main():
              chunks = [text[i:i+CHUNK_SIZE] for i in range(0, len(text), CHUNK_SIZE)]
              total  = len(chunks)
              print(f"Total chunks: {total}")

              parts       = []
              chunk_times = []
              batch_start = time.time()

              for i, chunk in enumerate(chunks):
                  path = f"{CHUNK_DIR}/chunk_{str(i).zfill(5)}.mp3"

                  if os.path.exists(path):
                      print(f"Chunk {i+1}/{total} already done, skipping...")
                      parts.append(path)
                      continue

                  if chunk_times:
                      avg     = sum(chunk_times) / len(chunk_times)
                      eta     = int(avg * (total - i))
                      elapsed = int(time.time() - batch_start)
                      print(f"Chunk {i+1}/{total}  ETA: {eta//60}m {eta%60}s  Elapsed: {elapsed//60}m {elapsed%60}s")
                  else:
                      print(f"Chunk {i+1}/{total}  ETA: calculating...")

                  chunk_start = time.time()
                  for attempt in range(3):
                      try:
                          comm = edge_tts.Communicate(chunk, VOICE)
                          await comm.save(path)
                          parts.append(path)
                          break
                      except Exception as e:
                          print(f"  Attempt {attempt+1} failed: {e}")
                          await asyncio.sleep(5)
                  else:
                      print(f"  Chunk {i+1} failed 3 times, skipping.")
                      continue

                  chunk_times.append(time.time() - chunk_start)

                  # Save progress to repo every SAVE_EVERY chunks
                  if (i + 1) % SAVE_EVERY == 0:
                      await git_commit_progress(i + 1)

              # ── Final commit of any remaining chunks ──
              await git_commit_progress(len(parts))

              # ── MERGE ──
              print(f"\nMerging {len(parts)} chunks...")
              merge_start  = time.time()
              sorted_parts = sorted(parts)
              list_path    = f"{CHUNK_DIR}/filelist.txt"

              with open(list_path, "w") as f:
                  for p in sorted_parts:
                      f.write(f"file '{os.path.abspath(p)}'\n")

              timestamp = datetime.now().strftime("%Y%m%d_%H%M%S")
              OUTPUT    = f"audio_repo/outputs/andrew_{timestamp}.mp3"
              os.makedirs("audio_repo/outputs", exist_ok=True)

              cmd = ["ffmpeg", "-y", "-f", "concat", "-safe", "0",
                     "-i", list_path, "-c", "copy", OUTPUT]

              process = subprocess.Popen(cmd, stderr=subprocess.PIPE, text=True)
              process.wait()

              if process.returncode != 0:
                  print("ffmpeg merge failed!")
                  return

              total_time = int(time.time() - batch_start)
              print(f"\nDONE! Time: {total_time//60}m {total_time%60}s")
              print(f"Saved to audio repo: {OUTPUT}")

              # ── Cleanup chunks from engine repo ──
              for p in sorted_parts:
                  try: os.remove(p)
                  except: pass
              try: os.remove(list_path)
              except: pass
              print("Chunks deleted. All clean!")

          asyncio.run(main())
          EOF

      - name: Push MP3 to audio repo
        run: |
          cd audio_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add outputs/
          git commit -m "TTS output: $(ls outputs/*.mp3 | tail -1 | xargs basename)"
          git push

      - name: Cleanup chunks from engine repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -r --cached chunks/ 2>/dev/null || true
          rm -rf chunks/
          git add -A
          git diff --cached --quiet || git commit -m "Cleanup: chunks deleted after merge"
          git push hey it saves the chunks so can i run two different workflows at once
